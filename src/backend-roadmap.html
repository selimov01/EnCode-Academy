<!DOCTYPE html>
<html lang="ru">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Роадмап: Backend-разработка — EnCode Academy</title>

        <script src="https://cdn.tailwindcss.com"></script>
        <script src="/static/js/tailwind-config.js"></script>
        <link rel="stylesheet" href="/static/styles/style.css">
        <link rel="stylesheet" href="/static/styles/backend-roadmap.css">

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    </head>

    <body class="bg-blueprint flex flex-col min-h-screen">

        <header class="main-header">
            <div class="container header-layout flex items-center justify-between py-4">
                <nav class="header-nav">
                    <ul class="flex gap-6">
                        <li><a href="/" class="hover:text-it-cyan transition">Главная</a></li>
                        <li><a href="/contacts" class="hover:text-it-cyan transition">Контакты</a></li>
                        <li><a href="/faq" class="hover:text-it-cyan transition">FAQ</a></li>
                    </ul>
                </nav>
                <div class="header-user">
                    <a href="/profile" class="btn-profile px-3 py-1 border border-it-cyan rounded font-mono hover:bg-it-cyan hover:text-black transition">
                        Личный кабинет
                    </a>
                </div>
            </div>
        </header>

        <main class="flex-1 pt-[100px] pb-10">
            <div class="container">

                <!-- Breadcrumb -->
                <div class="roadmap-breadcrumb">
                    <a href="/profile" class="roadmap-back-link">← Личный кабинет</a>
                    <span class="roadmap-breadcrumb-sep">/</span>
                    <span class="roadmap-breadcrumb-current">Backend-разработка</span>
                </div>

                <!-- Page header -->
                <div class="roadmap-page-header">
                    <div>
                        <p class="profile-kicker">[ ROADMAP ]</p>
                        <h1 class="section-title" style="margin-bottom: 0;">Backend-разработка</h1>
                    </div>
                    <a href="/roadmaps/backend.pdf" download="Роадмап — Backend-разработка.pdf" class="roadmap-action-btn roadmap-action-btn--primary">
                        ↓ Скачать PDF
                    </a>
                </div>

                <!-- Viewer card -->
                <div class="profile-card" style="padding: 0; overflow: hidden;">

                    <!-- Toolbar -->
                    <div class="roadmap-toolbar">
                        <div class="roadmap-toolbar-left">
                            <span class="card-type it" style="margin-bottom: 0;">PDF</span>
                            <span class="roadmap-toolbar-filename">backend.pdf</span>
                        </div>
                        <a href="/roadmaps/backend.pdf" target="_blank" class="roadmap-action-btn">
                            ↗ Открыть в новой вкладке
                        </a>
                    </div>

                    <!-- PDF frame -->
                    <embed
                        src="/roadmaps/backend.pdf"
                        type="application/pdf"
                        class="roadmap-frame"
                        title="Роадмап: Backend-разработка">
                </div>

            </div>
        </main>

        <footer class="main-footer mt-auto">
            <div class="container footer-layout">
                <div class="footer-brand">
                    <span class="logo">EnCode</span>
                    <p>Единство алгоритмов и физических систем</p>
                </div>
                <nav class="footer-links">
                    <ul>
                        <li><a href="/faq">База знаний</a></li>
                        <li><a href="/contacts">Техподдержка</a></li>
                    </ul>
                </nav>
                <div class="footer-tech-info">
                    <p>Core: <span class="status-ok">Active</span></p>
                    <p>Version: 0.10.3_Dev</p>
                </div>
            </div>
        </footer>

    </body>
</html>
